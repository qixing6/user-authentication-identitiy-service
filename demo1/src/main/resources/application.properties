spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/course_seckill?useUnicode=trueC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password= ${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.demo1.entity
mybatis.configuration.map-underscore-to-camel-case=true
logging.level.org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration=DEBUG
