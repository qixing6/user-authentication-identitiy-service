<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>зҷ»еҪ•зі»з»ҹ</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 20px; margin-right: 10px; cursor: pointer; }
        #result { margin-top: 20px; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<h2>з”ЁжҲ·зҷ»еҪ•/жіЁеҶҢ</h2>
<div class="form-group">
    <label>з”ЁжҲ·еҗҚ</label>
    <input type="text" id="username" placeholder="иҜ·иҫ“е…Ҙз”ЁжҲ·еҗҚ">
</div>
<div class="form-group">
    <label>еҜҶз Ғ</label>
    <input type="password" id="password" placeholder="иҜ·иҫ“е…ҘеҜҶз Ғ">
</div>
<button onclick="register()">жіЁеҶҢ</button>
<button onclick="login()">зҷ»еҪ•</button>
<div id="result"></div>

<script>
    const baseUrl = 'http://localhost:8080/api';

    function showResult(message, isSuccess) {
        const resultDiv = document.getElementById('result');
        resultDiv.textContent = message;
        resultDiv.className = isSuccess ? 'success' : 'error';
    }

    async function register() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        try {
            const res = await fetch(`${baseUrl}/register?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`, {
                method: 'POST'
            });
            const text = await res.text();
            showResult(text, res.ok);
        } catch (e) {
            showResult('жіЁеҶҢеӨұиҙҘпјҡ' + e.message, false);
        }
    }

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        try {
            const res = await fetch(`${baseUrl}/login?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`, {
                method: 'POST'
            });
            const text = await res.text();
            showResult(text, res.ok);
        } catch (e) {
            showResult('зҷ»еҪ•еӨұиҙҘпјҡ' + e.message, false);
        }
    }
</script>
</body>
</html>
